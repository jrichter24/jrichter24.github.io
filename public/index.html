<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dr. Jens Richter</title>
    <meta name="robots" content="noindex" />
    <!-- Root splash: picks the locale (remembered choice > browser language > en)
         and forwards to /de/ or /en/. Relative paths keep it working under a
         GitHub Pages basePath. Meta-refresh + noscript cover the no-JS case. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('locale');
          var nav = (navigator.language || 'en').toLowerCase();
          var loc = stored || (nav.indexOf('de') === 0 ? 'de' : 'en');
          if (loc !== 'de' && loc !== 'en') loc = 'en';
          location.replace('./' + loc + '/');
        } catch (e) {
          location.replace('./en/');
        }
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=./en/" />
    <style>
      body {
        font-family: ui-monospace, "JetBrains Mono", monospace;
        background: #f5f6f6;
        color: #000;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      a {
        color: #1d2eff;
      }
    </style>
  </head>
  <body>
    <noscript>
      <p>Language / Sprache: <a href="./en/">EN</a> · <a href="./de/">DE</a></p>
    </noscript>
    <p>200 OK, routing… <a href="./en/">continue →</a></p>
  </body>
</html>
